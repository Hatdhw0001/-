<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理中心-救急版</title>
    <!-- 引入手机端调试神器 VConsole -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>new VConsole();</script>
    
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #12131a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .login-box { width: 90%; max-width: 380px; background: rgba(31, 33, 46, 0.65); border: 1px solid rgba(255,255,255,0.08); padding: 30px; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 20px; background: linear-gradient(135deg, #8b5cf6, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #8b5cf6, #d946ef); color: #fff; font-weight: bold; }
        #msg { margin-top: 12px; text-align: center; font-size: 14px; min-height: 20px; color: #9ca3af; }
        #msg.error { color: #ef4444; } #msg.success { color: #22c55e; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>⚡ 管理中心</h2>
        <input type="text" id="loginUser" placeholder="用户名">
        <input type="password" id="loginPass" placeholder="密码">
        <button onclick="handleLogin()">🚀 登 录</button>
        <div id="msg">正在连接数据库...</div>
    </div>

    <script>
        // 你的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCI5yewq1Cu5I38LLjuky9KG1rnKh76W4Q",
            authDomain: "zmvv2011.firebaseapp.com",
            databaseURL: "https://zmvv2011-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zmvv2011",
            storageBucket: "zmvv2011.firebasestorage.app",
            messagingSenderId: "793178735751",
            appId: "1:793178735751:web:961c6e801b209e2dcce422"
        };

        const msgEl = document.getElementById('msg');
        function setMsg(txt, isError = false) { msgEl.textContent = txt; msgEl.className = isError ? 'error' : ''; }

        // 尝试初始化
        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            setMsg("✅ Firebase 连接成功！等待验证...");
            window.db = db; // 暴露给全局方便调试
        } catch (err) {
            setMsg("❌ 初始化崩溃: " + err.message, true);
        }

        // 登录验证
        async function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if(!user || !pass) return setMsg("⚠️ 请输入用户名和密码", true);
            
            setMsg("⏳ 正在验证身份...");
            try {
                // 读取 admin_users 节点
                const snap = await window.db.ref('admin_users/' + user).once('value');
                
                if (!snap.exists()) {
                    setMsg("❌ 用户名不存在，请先注册！", true);
                    return;
                }
                const data = snap.val();
                if (data.password !== pass) {
                    setMsg("❌ 密码错误！", true);
                    return;
                }
                setMsg("✅ 验证通过！正在进入后台...", false);
                alert("登录成功！你的数据没问题。请继续使用完整版 admin.html");
                
            } catch (e) {
                console.error("🔥 报错了：", e);
                setMsg("❌ 读取失败：" + e.message + " (请看右下角绿按钮内的 Log)", true);
            }
        }
    </script>
</body>
</html>
